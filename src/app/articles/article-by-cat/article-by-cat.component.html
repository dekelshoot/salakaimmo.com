<div *ngIf="articles[0]" class="Title">
    <h5>Filtrer</h5>
    <div class="slider filter">
        <div><button class=" btn " (click)="onFilter('date')" [disabled]="filter=='date'" [ngClass]="{'active':  filter =='date'}" > <div class="cercle " > <i class="bi bi-smartwatch"></i> </div> <p class="cat">Date</p></button></div>
        <div><button class=" btn " (click)="onFilter('prixCroissant')" [disabled]="filter=='prixCroissant'" [ngClass]="{'active':  filter =='prixCroissant'}"> <div class="cercle"> <i class="bi bi-cat bi-sort-down-alt"></i> </div> <p class="cat">Prix</p></button></div>
        <div><button class=" btn " (click)="onFilter('prixDecroissant')" [disabled]="filter=='prixDecroissant'" [ngClass]="{'active':  filter =='prixDecroissant'}"> <div class="cercle"> <i class="bi bi-cat bi-sort-up"></i> </div> <p class="cat">Prix</p></button></div>
        <div><button class=" btn "  data-bs-toggle="modal" data-bs-target="#exampleModal" [disabled]="filter=='quartier'" [ngClass]="{'active':  filter =='quartier'}"> <div class="cercle"> <i class="bi bi-cat bi-geo-alt"></i> </div> <p class="cat">Quartier</p></button></div>
    </div>
</div>

<div  *ngFor="let article of articles" >
    <button (click)="route('article/view/'+replace(article.categorie)+'-'+article.id)" class="btn container">
      <div class="course">
        <div class="course-image">
            <img *ngIf="article.photo" [src]="article.photo[0]"  alt="photo de l'article">
        </div>
        <div class="info">
            <h6 class="title float-start"> {{article.titre}}</h6>
            <p class="categorie float-start"> {{article.categorie}}</p> <div></div>
            <p class="p-trunc lieu float-start"><i class="bi bi-geo-alt-fill"></i> {{article.lieu}} <span></span></p>
              <h6 class="prix float-end">{{money(article.prix)}} FCFA</h6>
        </div>
      </div>
    </button>
  </div>
  <div *ngIf="spinner"  style="align-items: center; text-align: center;"> 
    <br><br><br><br>
    <div>
      <div class="spinner-border text-purple" role="status">
        <span class="visually-hidden">Loading...</span>
    </div>
    <p style="color: rgb(143, 139, 133);">Loading...</p>
    </div>
    <br><br><br><br>
  </div>

  <!-- Modal -->
  <div class="modal  fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
    <div class="modal-dialog   modal-dialog-centered">
      <div class="modal-content cont-modal">
        <div class="modal-body">
           <div class="head">
                <h5 class="modal-title" id="exampleModalLabel">Filter par quartier</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <br>
            <div>
                <form class="form" [formGroup]="lieuForm" (ngSubmit)="onFilterLieu()">
                    <div class="form-floating select">
                        <select class="form-select" id="floatingSelect" aria-label="Floating label select example" formControlName="lieu">
                          <option *ngFor="let lieu of lieu">{{lieu}}</option>
                        </select>
                        <label for="floatingSelect">Lieu</label>
                      </div>
                      <button type="button" data-bs-dismiss="modal"  class="btn btn-modal" [disabled]="lieuForm.invalid " 
                      type="submit">Filtrer</button>
                  </form>
            </div>
        </div>
      </div>
    </div>
  </div>
